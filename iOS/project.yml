name: Vellumbook
options:
  bundleIdPrefix: com.shimondeitel.bookbindinglog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Vellumbook:
    type: application
    platform: iOS
    sources:
      - path: Vellumbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bookbindinglog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Vellumbook/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VellumbookTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VellumbookTests
      - path: Vellumbook.storekit
    dependencies:
      - target: Vellumbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bookbindinglog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  VellumbookUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VellumbookUITests
    dependencies:
      - target: Vellumbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bookbindinglog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Vellumbook:
    build:
      targets:
        Vellumbook: all
        VellumbookTests: [test]
        VellumbookUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Vellumbook.storekit
    test:
      config: Debug
      storeKitConfiguration: Vellumbook.storekit
      targets:
        - VellumbookTests
        - VellumbookUITests
    archive:
      config: Release
